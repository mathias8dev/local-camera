           C95 35, 80 20, 60 22
           C40 24, 25 30, 15 25
           C5 20, 0 12, 5 8
           C10 4, 18 8, 25 15
           C32 22, 40 18, 55 20
           C70 22, 85 28, 100 40
           Z"
        fill="#2C1810" />
  <!-- Right half of mustache -->
  <path d="M100 45
           C105 35, 120 20, 140 22
           C160 24, 175 30, 185 25
           C195 20, 200 12, 195 8
           C190 4, 182 8, 175 15
           C168 22, 160 18, 145 20
           C130 22, 115 28, 100 40
           Z"
        fill="#2C1810" />
  <!-- Center thickening -->
  <ellipse cx="100" cy="42" rx="12" ry="8" fill="#2C1810" />
  <!-- Subtle highlight for dimension -->
  <path d="M60 28 C70 25, 85 30, 95 38" stroke="#3D2A1E" stroke-width="2" fill="none" opacity="0.5" />
  <path d="M140 28 C130 25, 115 30, 105 38" stroke="#3D2A1E" stroke-width="2" fill="none" opacity="0.5" />
  <!-- Curl details at tips -->
  <circle cx="7" cy="10" r="5" fill="none" stroke="#2C1810" stroke-width="2.5" opacity="0.6"
          stroke-dasharray="0 8 10" />
  <circle cx="193" cy="10" r="5" fill="none" stroke="#2C1810" stroke-width="2.5" opacity="0.6"
          stroke-dasharray="0 8 10" />
</svg>
